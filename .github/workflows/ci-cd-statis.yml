name: CI/CD Pipeline - webStatis

on:
  push:
    branches:
      - main
    paths:
      - 'webStatis/**'
      - '.github/workflows/ci-cd-statis.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'webStatis/**'

jobs:
  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./webStatis
          file: ./webStatis/Dockerfile
          push: true
          tags: muharifrizky0225pohv/uasstatis:latest

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            if [ -d "$HOME/UAS_2388010017" ]; then
              cd "$HOME/UAS_2388010017"
            elif [ -d "$HOME/UAS" ]; then
              cd "$HOME/UAS"
            else
              git clone https://github.com/muhammadarf5555-collab/UAS_2388010017.git "$HOME/UAS_2388010017"
              cd "$HOME/UAS_2388010017"
            fi
            git fetch --all
            git reset --hard origin/main
            if [ ! -f .env ]; then
              cp .env.example .env
            fi
            docker compose pull web-statis || docker-compose pull web-statis
            docker compose up -d web-statis || docker-compose up -d web-statis
